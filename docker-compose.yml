version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: invoice_postgres

    restart: always

    environment:
      POSTGRES_DB: invoice_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: invoice_redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: