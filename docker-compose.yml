version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: invoice_postgres
    restart: always
    environment:
      POSTGRES_DB: invoice_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: invoice_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/invoice_ai
      REDIS_URL: redis://redis:6379/0

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: >
      celery
      -A app.workers.celery_app.celery_app
      worker
      --loglevel=info
    depends_on:
      - redis
      - backend

volumes:
  postgres_data: